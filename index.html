<!DOCTYPE html>
<html lang="si" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameFusion Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { dark: '#0a0a0a', card: '#141414', light: '#f5f5f5', muted: '#a3a3a3' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .photo-card img { transition: all 0.5s ease; filter: grayscale(100%); }
        .photo-card:hover img { filter: grayscale(0%); transform: scale(1.05); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; width: 100%; border-radius: 8px; overflow:hidden;}
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .star-rating i { cursor: pointer; transition: color 0.2s; }
        .star-rating i:hover, .star-rating i.active { color: #eab308; }
    </style>
</head>
<body class="min-h-screen pb-12 flex flex-col items-center selection:bg-white selection:text-black">

    <main id="main-content" class="w-full max-w-2xl bg-card min-h-screen shadow-2xl relative overflow-hidden border-x border-white/5 opacity-0 transition-opacity duration-1000">
        
        <div class="relative w-full h-64 sm:h-80">
            <!-- අඳුරු ගතිය අයින් කරලා ලස්සනට Fade වෙන විදිහට Overlay එක වෙනස් කරලා ඇත -->
            <div class="absolute inset-0 bg-gradient-to-t from-card via-card/10 to-transparent z-10 pointer-events-none"></div>
            <img id="ui-cover" src="https://via.placeholder.com/800x400" class="w-full h-full object-cover">
        </div>

        <div class="relative z-20 px-6 sm:px-10 -mt-20 sm:-mt-24">
            <div class="flex justify-between items-end">
                
                <!-- ලෝගෝ එකේ සුදු පාට අයින් කරලා රවුමට කපපු තැන (Fixed Logo Container) -->
                <div class="w-32 h-32 sm:w-40 sm:h-40 rounded-full border-4 border-card bg-card shadow-2xl relative overflow-hidden group">
                    <img id="ui-logo" src="https://via.placeholder.com/150" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                </div>
                
                <div class="flex gap-3 mb-2" id="social-links-container"></div>
            </div>

            <div class="mt-6">
                <h1 id="ui-name" class="text-3xl sm:text-4xl font-bold tracking-tight text-white uppercase drop-shadow-lg">Loading...</h1>
                <p class="text-muted tracking-[0.2em] text-xs sm:text-sm uppercase mt-1 mb-4 font-semibold">Professional Studio</p>
                <p id="ui-bio" class="text-light/80 text-sm sm:text-base leading-relaxed font-light max-w-lg"></p>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 mt-8">
                <button onclick="saveContact()" class="flex-1 bg-white hover:bg-gray-200 text-black py-4 rounded-xl font-bold tracking-wide transition-all shadow-[0_0_30px_rgba(255,255,255,0.15)] flex items-center justify-center gap-2 transform hover:-translate-y-1">
                    <i class="fas fa-bookmark"></i> Save Contact
                </button>
                <a id="ui-whatsapp-btn" href="#" target="_blank" class="flex-1 border border-white/20 hover:bg-white hover:text-black text-white py-4 rounded-xl font-bold tracking-wide transition-all flex items-center justify-center gap-2 transform hover:-translate-y-1">
                    <i class="fab fa-whatsapp text-lg"></i> WhatsApp
                </a>
            </div>
        </div>

        <hr class="border-white/10 my-12 mx-6 sm:mx-10">

        <!-- Portfolio Sections -->
        <div class="px-6 sm:px-10 pb-10" id="portfolio-container">
            <div class="text-center text-gray-500 py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="reviewModal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-card border border-white/10 p-8 rounded-3xl w-full max-w-md mx-4 transform scale-95 transition-transform duration-300 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-white tracking-wide">Rate Experience</h3>
                <button onclick="closeReviewModal()" class="text-gray-400 hover:text-white bg-white/5 w-8 h-8 rounded-full flex items-center justify-center transition"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex justify-center gap-3 text-4xl text-gray-600 mb-8 star-rating" id="star-container">
                <i class="fas fa-star drop-shadow-md" onclick="setRating(1)"></i>
                <i class="fas fa-star drop-shadow-md" onclick="setRating(2)"></i>
                <i class="fas fa-star drop-shadow-md" onclick="setRating(3)"></i>
                <i class="fas fa-star drop-shadow-md" onclick="setRating(4)"></i>
                <i class="fas fa-star drop-shadow-md" onclick="setRating(5)"></i>
            </div>

            <input type="text" id="rev-name" placeholder="Your Name" class="w-full bg-dark/50 border border-white/10 rounded-xl p-4 text-white mb-4 outline-none focus:border-white/40 transition">
            <textarea id="rev-comment" placeholder="Tell us about the shoot..." rows="3" class="w-full bg-dark/50 border border-white/10 rounded-xl p-4 text-white mb-6 outline-none focus:border-white/40 transition resize-none"></textarea>
            
            <button onclick="submitReview()" id="btn-submit-rev" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition shadow-lg shadow-white/10 transform hover:-translate-y-0.5">Post Review</button>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm flex flex-col items-center justify-center z-50 hidden opacity-0 transition-opacity">
        <button onclick="closeModal('lightboxModal')" class="absolute top-6 right-6 w-12 h-12 bg-white/10 hover:bg-white hover:text-black rounded-full text-white flex items-center justify-center transition-all z-10"><i class="fas fa-times text-xl"></i></button>
        <img id="lightboxImage" src="" class="max-w-full max-h-[85vh] object-contain transition-transform transform scale-95 duration-500 hidden shadow-2xl rounded-lg">
        <div id="lightboxVideoWrapper" class="w-full max-w-4xl px-4 hidden"><div class="video-container shadow-2xl"><iframe id="lightboxVideo" src="" frameborder="0" allowfullscreen></iframe></div></div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCj6eoLnrYeNb4hRg5kdmRT9fHVhTJvEA0",
            authDomain: "business-profile-4f6cb.firebaseapp.com",
            projectId: "business-profile-4f6cb",
            storageBucket: "business-profile-4f6cb.firebasestorage.app",
            messagingSenderId: "229994315976",
            appId: "1:229994315976:web:68535e4a84f3d2597825fd",
            measurementId: "G-S8HZY02RXQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let profileData = {};
        let allProjects = [];
        let allReviews = [];

        async function loadProfile() {
            const snap = await getDoc(doc(db, "settings", "profile"));
            if (snap.exists()) {
                profileData = snap.data();
                document.getElementById('ui-name').innerText = profileData.name || "Studio";
                document.getElementById('ui-bio').innerText = profileData.bio || "";
                if(profileData.coverUrl) document.getElementById('ui-cover').src = profileData.coverUrl;
                if(profileData.logoUrl) document.getElementById('ui-logo').src = profileData.logoUrl;
                
                let waBtn = document.getElementById('ui-whatsapp-btn');
                if(profileData.phone) waBtn.href = `https://wa.me/${profileData.phone.replace(/[^0-9]/g, '')}`;
                else waBtn.style.display = 'none';

                let socialsHTML = '';
                if(profileData.insta) socialsHTML += `<a href="${profileData.insta}" class="w-12 h-12 rounded-full bg-white/5 border border-white/10 hover:bg-white hover:text-black flex items-center justify-center transition-all shadow-lg backdrop-blur-sm"><i class="fab fa-instagram text-lg"></i></a>`;
                if(profileData.fb) socialsHTML += `<a href="${profileData.fb}" class="w-12 h-12 rounded-full bg-white/5 border border-white/10 hover:bg-white hover:text-black flex items-center justify-center transition-all shadow-lg backdrop-blur-sm"><i class="fab fa-facebook-f text-lg"></i></a>`;
                document.getElementById('social-links-container').innerHTML = socialsHTML;
            }
            document.getElementById('main-content').classList.remove('opacity-0');
        }

        function loadData() {
            onSnapshot(query(collection(db, "projects"), orderBy("createdAt", "desc")), (snap) => {
                allProjects = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderPortfolio();
            });
            onSnapshot(query(collection(db, "reviews"), orderBy("createdAt", "desc")), (snap) => {
                allReviews = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderPortfolio();
            });
        }

        function renderPortfolio() {
            const container = document.getElementById('portfolio-container');
            container.innerHTML = '';
            
            allProjects.forEach((proj) => {
                if(!proj.items || proj.items.length === 0) return;
                
                let itemsHtml = proj.items.map(item => {
                    if(item.type === 'photo') return `<div class="photo-card cursor-pointer rounded-2xl overflow-hidden relative aspect-square sm:aspect-[4/5] bg-dark shadow-xl border border-white/5" onclick="openLightbox('${item.url}', 'photo')"><img src="${item.url}" class="w-full h-full object-cover"></div>`;
                    let vidId = item.url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
                    vidId = (vidId && vidId[2].length === 11) ? vidId[2] : null;
                    return `<div class="photo-card cursor-pointer rounded-2xl overflow-hidden relative aspect-square sm:aspect-[4/5] bg-dark shadow-xl border border-white/5" onclick="openLightbox('${vidId}', 'youtube')"><img src="https://img.youtube.com/vi/${vidId}/hqdefault.jpg" class="w-full h-full object-cover opacity-70"><div class="absolute inset-0 flex items-center justify-center"><i class="fab fa-youtube text-5xl text-red-600 drop-shadow-2xl"></i></div></div>`;
                }).join('');

                const projReviews = allReviews.filter(r => r.projectId === proj.id);
                let reviewsHtml = projReviews.map(r => `
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/5 backdrop-blur-sm relative">
                        <i class="fas fa-quote-left absolute top-4 right-4 text-white/5 text-3xl"></i>
                        <div class="flex justify-between items-start mb-3">
                            <h4 class="font-bold text-white text-base">${r.name}</h4>
                            <div class="text-yellow-500 text-sm tracking-widest">${'★'.repeat(r.rating)}${'<span class="text-gray-600">★</span>'.repeat(5-r.rating)}</div>
                        </div>
                        <p class="text-gray-400 text-sm italic leading-relaxed">"${r.comment}"</p>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="mb-16">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold text-white tracking-wide flex items-center gap-3"><span class="w-1 h-6 bg-white rounded-full"></span>${proj.name}</h2>
                            <button onclick="openReviewModal('${proj.id}')" class="text-xs font-bold bg-white/10 hover:bg-white hover:text-black px-4 py-2 rounded-full transition uppercase tracking-wider flex items-center gap-2"><i class="fas fa-star text-yellow-500"></i> Rate</button>
                        </div>
                        
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-5 mb-8">${itemsHtml}</div>
                        
                        ${projReviews.length > 0 ? `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">${reviewsHtml}</div>` : ''}
                    </div>
                `;
            });
        }

        loadProfile();
        loadData();

        let currentReviewProjectId = null;
        let currentRating = 5;

        window.openReviewModal = (pid) => {
            currentReviewProjectId = pid;
            setRating(5);
            document.getElementById('rev-name').value = '';
            document.getElementById('rev-comment').value = '';
            const modal = document.getElementById('reviewModal');
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modal.querySelector('div').classList.remove('scale-95');
        };

        window.closeReviewModal = () => {
            const modal = document.getElementById('reviewModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.setRating = (stars) => {
            currentRating = stars;
            const icons = document.getElementById('star-container').children;
            for(let i=0; i<5; i++) {
                if(i < stars) { icons[i].classList.add('text-yellow-500'); icons[i].classList.remove('text-gray-600'); }
                else { icons[i].classList.remove('text-yellow-500'); icons[i].classList.add('text-gray-600'); }
            }
        };

        window.submitReview = async () => {
            const name = document.getElementById('rev-name').value.trim();
            const comment = document.getElementById('rev-comment').value.trim();
            if(!name || !comment) return alert("Please enter your name and comment.");
            const btn = document.getElementById('btn-submit-rev');
            btn.innerText = "Publishing..."; btn.disabled = true;
            await addDoc(collection(db, "reviews"), { projectId: currentReviewProjectId, name, rating: currentRating, comment, createdAt: Date.now() });
            btn.innerText = "Post Review"; btn.disabled = false;
            closeReviewModal();
        };

        window.openLightbox = (src, type) => {
            const m = document.getElementById('lightboxModal'), img = document.getElementById('lightboxImage'), vid = document.getElementById('lightboxVideoWrapper'), vidIframe = document.getElementById('lightboxVideo');
            if(type === 'photo') { vid.classList.add('hidden'); img.src = src; img.classList.remove('hidden'); } 
            else { img.classList.add('hidden'); vidIframe.src = `https://www.youtube.com/embed/${src}?autoplay=1`; vid.classList.remove('hidden'); }
            m.classList.remove('hidden'); void m.offsetWidth; m.classList.remove('opacity-0'); if(type==='photo') img.classList.remove('scale-95');
        };

        window.closeModal = (id) => {
            const m = document.getElementById(id); m.classList.add('opacity-0');
            document.getElementById('lightboxImage').classList.add('scale-95');
            setTimeout(() => { m.classList.add('hidden'); document.getElementById('lightboxVideo').src = ''; }, 300);
        };

        window.saveContact = () => {
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${profileData.name || 'Studio'}\nTEL;TYPE=WORK,VOICE:${profileData.phone || ''}\nEND:VCARD`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([vcard], { type: "text/vcard" }));
            a.download = "Contact.vcf"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };
    </script>
</body>
</html>
