<!DOCTYPE html>
<html lang="si" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrameFusion Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { dark: '#0a0a0a', card: '#141414', light: '#f5f5f5', muted: '#a3a3a3' },
                    animation: {
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; margin: 0; padding: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .photo-card img, .photo-card video, .photo-card .icon-container { transition: all 0.5s ease; }
        .photo-card:hover img, .photo-card:hover video, .photo-card:hover .icon-container { transform: scale(1.05); }
        
        .star-rating i { cursor: pointer; transition: color 0.2s; }
        .star-rating i:hover, .star-rating i.active { color: #eab308; }

        /* Cinematic Pre-loader Styles */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.86, 0, 0.07, 1), opacity 0.8s ease-out;
        }
        
        #preloader.slide-up {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        #preloader-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.8);
            opacity: 0;
            animation: fadeInScale 1s ease-out forwards;
        }

        @keyframes fadeInScale {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        #preloader-spinner {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 2px solid transparent;
            border-top-color: #f5f5f5;
            border-bottom-color: #f5f5f5;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            opacity: 0.5;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Hide content initially to prevent scroll jumping during preloader */
        body.loading { overflow: hidden; }
    </style>
</head>
<body class="loading min-h-screen pb-12 flex flex-col items-center selection:bg-white selection:text-black">

    <!-- Cinematic Preloader -->
    <div id="preloader">
        <div id="preloader-spinner"></div>
        <img id="preloader-logo" src="https://images.unsplash.com/photo-1554048612-b6a09faf798b?q=80&w=400&auto=format&fit=crop" alt="FrameFusion">
    </div>

    <main id="main-content" class="w-full max-w-5xl bg-card min-h-screen shadow-2xl relative overflow-hidden border-x border-white/5 opacity-0 transition-opacity duration-1000">
        
        <div class="relative w-full h-48 sm:h-72 md:h-96">
            <div class="absolute inset-0 bg-gradient-to-t from-card via-card/10 to-transparent z-10 pointer-events-none"></div>
            <img id="ui-cover" src="https://images.unsplash.com/photo-1452587925148-ce544e77e70d?q=80&w=2000&auto=format&fit=crop" class="w-full h-full object-cover">
        </div>

        <div class="relative z-20 px-5 sm:px-12 md:px-16 -mt-14 sm:-mt-24 md:-mt-32">
            <div class="flex justify-between items-end">
                
                <div class="w-28 h-28 sm:w-40 sm:h-40 md:w-48 md:h-48 rounded-full border-4 border-card bg-card shadow-2xl relative overflow-hidden group flex items-center justify-center">
                    <img id="ui-logo" src="https://images.unsplash.com/photo-1554048612-b6a09faf798b?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                </div>
                
                <div class="flex gap-2 sm:gap-3 mb-2 sm:mb-4 md:mb-6" id="social-links-container"></div>
            </div>

            <div class="mt-4 sm:mt-8">
                <div class="flex items-center gap-2 flex-wrap">
                    <h1 id="ui-name" class="text-[26px] sm:text-4xl md:text-5xl font-bold tracking-tight text-white uppercase drop-shadow-lg leading-tight">Loading...</h1>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" id="verified-badge" class="text-blue-500 flex-shrink-0 w-6 h-6 sm:w-8 sm:h-8 md:w-9 md:h-9 mt-1">
                        <path fill="currentColor" fill-rule="evenodd" d="M10.9388 1.13669C11.4793 0.449229 12.5208 0.44923 13.0613 1.13669L14.808 3.35829L17.527 2.58767C18.3683 2.34921 19.2109 2.96138 19.2441 3.83525L19.3514 6.65926L22.004 7.63397C22.8249 7.93559 23.1467 8.92611 22.6599 9.6526L21.0868 12.0003L22.6599 14.3481C23.1467 15.0746 22.8249 16.0651 22.004 16.3667L19.3514 17.3414L19.2441 20.1654C19.2109 21.0393 18.3683 21.6515 17.527 21.413L14.808 20.6424L13.0613 22.864C12.5208 23.5515 11.4793 23.5515 10.9388 22.864L9.19206 20.6424L6.47311 21.413C5.63175 21.6515 4.78916 21.0393 4.75596 20.1654L4.64866 17.3414L1.99603 16.3667C1.17519 16.0651 0.853351 15.0746 1.34014 14.3481L2.91324 12.0003L1.34013 9.6526C0.85335 8.92611 1.17519 7.93559 1.99603 7.63397L4.64866 6.65926L4.75596 3.83525C4.78916 2.96138 5.63175 2.34921 6.47311 2.58767L9.19206 3.35829L10.9388 1.13669ZM9.21967 11.8486C9.51256 11.5557 9.98744 11.5557 10.2803 11.8486L11.75 13.3182L15.2197 9.84858C15.5126 9.55568 15.9874 9.55568 16.2803 9.84858C16.5732 10.1415 16.5732 10.6163 16.2803 10.9092L12.2803 14.9092C11.9874 15.2021 11.5126 15.2021 11.2197 14.9092L9.21967 12.9092C8.92678 12.6163 8.92678 12.1415 9.21967 11.8486Z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                
                <p class="text-muted tracking-[0.2em] text-xs sm:text-sm uppercase mt-1 mb-4 font-semibold">Professional Studio</p>
                <p id="ui-bio" class="text-light/90 text-sm sm:text-base leading-relaxed font-light max-w-3xl whitespace-pre-wrap"></p>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 mt-8 max-w-2xl">
                <button onclick="saveContact()" class="flex-1 bg-white hover:bg-gray-200 text-black py-3 sm:py-4 rounded-xl font-bold tracking-wide transition-all shadow-[0_0_30px_rgba(255,255,255,0.15)] flex items-center justify-center gap-2 transform hover:-translate-y-1">
                    <i class="fas fa-bookmark"></i> Save Contact
                </button>
                <a id="ui-whatsapp-btn" href="#" target="_blank" class="flex-1 border border-white/20 hover:bg-white hover:text-black text-white py-3 sm:py-4 rounded-xl font-bold tracking-wide transition-all flex items-center justify-center gap-2 transform hover:-translate-y-1">
                    <i class="fab fa-whatsapp text-lg"></i> WhatsApp
                </a>
            </div>
        </div>

        <hr class="border-white/10 my-10 mx-5 sm:mx-12 md:mx-16">

        <div class="px-5 sm:px-12 md:px-16 pb-12" id="portfolio-container">
            <div class="text-center text-gray-500 py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="reviewModal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-card border border-white/10 p-8 rounded-3xl w-full max-w-md mx-4 transform scale-95 transition-transform duration-300 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-white tracking-wide">Rate Experience</h3>
                <button onclick="closeReviewModal()" class="text-gray-400 hover:text-white bg-white/5 w-8 h-8 rounded-full flex items-center justify-center transition"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex justify-center gap-3 text-4xl text-gray-600 mb-8 star-rating" id="star-container">
                <i class="fas fa-star drop-shadow-md" onclick="setRating(1)"></i>
                <i class="fas fa-star drop-shadow-md" onclick="setRating(2)"></i>
                <i class="fas fa-star drop-shadow-md" onclick="setRating(3)"></i>
                <i class="fas fa-star drop-shadow-md" onclick="setRating(4)"></i>
                <i class="fas fa-star drop-shadow-md" onclick="setRating(5)"></i>
            </div>

            <input type="text" id="rev-name" placeholder="Your Name" class="w-full bg-dark/50 border border-white/10 rounded-xl p-4 text-white mb-4 outline-none focus:border-white/40 transition">
            <textarea id="rev-comment" placeholder="Tell us about the shoot..." rows="3" class="w-full bg-dark/50 border border-white/10 rounded-xl p-4 text-white mb-6 outline-none focus:border-white/40 transition resize-none"></textarea>
            
            <button onclick="submitReview()" id="btn-submit-rev" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition shadow-lg shadow-white/10 transform hover:-translate-y-0.5">Post Review</button>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm flex flex-col items-center justify-center z-50 hidden opacity-0 transition-opacity">
        <button onclick="closeModal('lightboxModal')" class="absolute top-4 right-4 sm:top-6 sm:right-6 w-12 h-12 bg-white/10 hover:bg-white hover:text-black rounded-full text-white flex items-center justify-center transition-all z-20"><i class="fas fa-times text-xl"></i></button>
        
        <img id="lightboxImage" src="" class="max-w-full max-h-[85vh] object-contain transition-transform transform scale-95 duration-500 hidden shadow-2xl rounded-lg px-2">
        
        <div id="lightboxIframeWrapper" class="hidden mx-auto flex items-center justify-center z-10 w-full relative">
            <iframe id="lightboxIframe" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen class="rounded-xl shadow-2xl bg-black"></iframe>
        </div>

        <video id="lightboxNativeVideo" controls controlsList="nodownload" class="w-full max-w-4xl max-h-[85vh] object-contain transition-transform transform scale-95 duration-500 hidden shadow-2xl rounded-lg bg-black px-2"></video>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCj6eoLnrYeNb4hRg5kdmRT9fHVhTJvEA0",
            authDomain: "business-profile-4f6cb.firebaseapp.com",
            projectId: "business-profile-4f6cb",
            storageBucket: "business-profile-4f6cb.firebasestorage.app",
            messagingSenderId: "229994315976",
            appId: "1:229994315976:web:68535e4a84f3d2597825fd",
            measurementId: "G-S8HZY02RXQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let profileData = {};
        let allProjects = [];
        let allReviews = [];

        async function loadProfile() {
            try {
                const snap = await getDoc(doc(db, "settings", "profile"));
                if (snap.exists()) {
                    profileData = snap.data();
                    document.getElementById('ui-name').innerText = profileData.name || "Studio";
                    document.getElementById('ui-bio').innerText = profileData.bio || "";
                    if(profileData.coverUrl) document.getElementById('ui-cover').src = profileData.coverUrl;
                    
                    if(profileData.logoUrl) {
                        document.getElementById('ui-logo').src = profileData.logoUrl;
                        // Preloader එකේ ලෝගෝ එකත් අප්ඩේට් කරන්න
                        document.getElementById('preloader-logo').src = profileData.logoUrl;
                    }
                    
                    let waBtn = document.getElementById('ui-whatsapp-btn');
                    if(profileData.phone) waBtn.href = `https://wa.me/${profileData.phone.replace(/[^0-9]/g, '')}`;
                    else waBtn.style.display = 'none';

                    let socialsHTML = '';
                    if(profileData.insta) socialsHTML += `<a href="${profileData.insta}" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-white/5 border border-white/10 hover:bg-white hover:text-black flex items-center justify-center transition-all shadow-lg backdrop-blur-sm"><i class="fab fa-instagram text-base sm:text-lg"></i></a>`;
                    if(profileData.fb) socialsHTML += `<a href="${profileData.fb}" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-white/5 border border-white/10 hover:bg-white hover:text-black flex items-center justify-center transition-all shadow-lg backdrop-blur-sm"><i class="fab fa-facebook-f text-base sm:text-lg"></i></a>`;
                    document.getElementById('social-links-container').innerHTML = socialsHTML;
                }
            } catch (error) {
                console.error("Error loading profile:", error);
            } finally {
                // Minimum time for preloader to show its animation (1.5s)
                setTimeout(() => {
                    removePreloader();
                }, 1500);
            }
        }

        function removePreloader() {
            const preloader = document.getElementById('preloader');
            preloader.classList.add('slide-up');
            document.body.classList.remove('loading');
            
            setTimeout(() => {
                document.getElementById('main-content').classList.remove('opacity-0');
            }, 300); // Wait a bit before showing the main content
        }

        function loadData() {
            onSnapshot(query(collection(db, "projects"), orderBy("createdAt", "desc")), (snap) => {
                allProjects = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderPortfolio();
            });
            onSnapshot(query(collection(db, "reviews"), orderBy("createdAt", "desc")), (snap) => {
                allReviews = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderPortfolio();
            });
        }

        function renderPortfolio() {
            const container = document.getElementById('portfolio-container');
            container.innerHTML = '';
            
            let tiktokFetches = [];
            
            allProjects.forEach((proj) => {
                if(!proj.items || proj.items.length === 0) return;
                
                let itemsHtml = proj.items.map(item => {
                    if(item.type === 'photo') {
                        return `<div class="photo-card cursor-pointer rounded-2xl overflow-hidden relative aspect-square sm:aspect-[4/5] bg-dark shadow-xl border border-white/5" onclick="openLightbox('${item.url}', 'photo')"><img src="${item.url}" class="w-full h-full object-cover"></div>`;
                    }
                    
                    let url = item.url;
                    let thumbHtml = '';
                    let clickArgs = '';

                    if (url.includes('vimeo.com')) {
                        let vId = url.match(/vimeo\.com\/(\d+)/)?.[1];
                        if(!vId) return '';
                        clickArgs = `'${vId}', 'vimeo'`;
                        thumbHtml = `<div class="w-full h-full bg-zinc-900 flex items-center justify-center icon-container"><i class="fab fa-vimeo-v text-5xl text-blue-400 drop-shadow-lg"></i></div>`;
                    } 
                    else if (url.includes('drive.google.com')) {
                        let driveMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
                        let driveId = driveMatch ? driveMatch[1] : null;
                        if(!driveId) return '';
                        clickArgs = `'${driveId}', 'gdrive'`;
                        
                        thumbHtml = `
                            <video src="https://drive.google.com/uc?export=download&id=${driveId}#t=1.5" class="w-full h-full object-cover opacity-80" preload="metadata" muted playsinline></video>
                            <div class="absolute inset-0 flex items-center justify-center icon-container"><i class="fab fa-google-drive text-5xl text-blue-500 drop-shadow-2xl"></i></div>
                        `;
                    }
                    else if (url.includes('tiktok.com') || url.includes('data-video-id=')) {
                        let ttMatch = url.match(/(?:video\/|v2\/|data-video-id=")(\d+)/);
                        let ttId = ttMatch ? ttMatch[1] : null;
                        if(!ttId) return '';
                        clickArgs = `'${ttId}', 'tiktok'`;
                        
                        thumbHtml = `
                            <img id="tt-thumb-${ttId}" src="https://images.unsplash.com/photo-1611605698335-8b1569810432?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover opacity-40 transition-opacity duration-500">
                            <div class="absolute inset-0 flex items-center justify-center icon-container"><i class="fab fa-tiktok text-5xl text-white drop-shadow-2xl"></i></div>
                        `;
                        tiktokFetches.push(ttId);
                    }
                    else if (url.toLowerCase().endsWith('.mp4')) {
                        clickArgs = `'${url}', 'mp4'`;
                        thumbHtml = `
                            <video src="${url}#t=1.5" class="w-full h-full object-cover opacity-80" preload="metadata" muted playsinline></video>
                            <div class="absolute inset-0 flex items-center justify-center icon-container"><i class="fas fa-play-circle text-5xl text-white/80 drop-shadow-lg"></i></div>
                        `;
                    } 
                    else {
                        let isShort = url.includes('/shorts/');
                        let vidMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|shorts\/))([\w-]{11})/);
                        let vidId = vidMatch ? vidMatch[1] : null;
                        if (!vidId) return '';
                        clickArgs = `'${vidId}', '${isShort ? 'youtube-short' : 'youtube'}'`;
                        thumbHtml = `<img src="https://img.youtube.com/vi/${vidId}/hqdefault.jpg" class="w-full h-full object-cover opacity-70"><div class="absolute inset-0 flex items-center justify-center icon-container"><i class="fab fa-youtube text-5xl text-red-600 drop-shadow-2xl"></i></div>`;
                    }

                    return `<div class="photo-card cursor-pointer rounded-2xl overflow-hidden relative aspect-square sm:aspect-[4/5] bg-dark shadow-xl border border-white/5" onclick="openLightbox(${clickArgs})">${thumbHtml}</div>`;
                }).join('');

                const projReviews = allReviews.filter(r => r.projectId === proj.id);
                let reviewsHtml = projReviews.map(r => `
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/5 backdrop-blur-sm relative h-full">
                        <i class="fas fa-quote-left absolute top-4 right-4 text-white/5 text-3xl"></i>
                        <div class="flex justify-between items-start mb-3">
                            <h4 class="font-bold text-white text-base">${r.name}</h4>
                            <div class="text-yellow-500 text-sm tracking-widest">${'★'.repeat(r.rating)}${'<span class="text-gray-600">★</span>'.repeat(5-r.rating)}</div>
                        </div>
                        <p class="text-gray-400 text-sm italic leading-relaxed">"${r.comment}"</p>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="mb-16">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl sm:text-3xl font-bold text-white tracking-wide flex items-center gap-2 sm:gap-3"><span class="w-1.5 h-6 sm:h-8 bg-white rounded-full"></span>${proj.name}</h2>
                            <button onclick="openReviewModal('${proj.id}')" class="text-xs sm:text-sm font-bold bg-white/10 hover:bg-white hover:text-black px-4 sm:px-5 py-2.5 rounded-full transition uppercase tracking-wider flex items-center gap-2"><i class="fas fa-star text-yellow-500"></i> Rate</button>
                        </div>
                        
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 sm:gap-5 md:gap-6 mb-8">${itemsHtml}</div>
                        
                        ${projReviews.length > 0 ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-6">${reviewsHtml}</div>` : ''}
                    </div>
                `;
            });
            
            tiktokFetches.forEach(ttId => {
                fetch(`https://www.tiktok.com/oembed?url=https://www.tiktok.com/@user/video/${ttId}`)
                .then(res => res.json())
                .then(data => {
                    let imgEl = document.getElementById(`tt-thumb-${ttId}`);
                    if (imgEl && data.thumbnail_url) {
                        imgEl.src = data.thumbnail_url;
                        imgEl.classList.remove('opacity-40'); 
                    }
                }).catch(e => console.error('TikTok thumb error', e));
            });
        }

        loadProfile(); // This now handles the preloader removal
        loadData();

        let currentReviewProjectId = null;
        let currentRating = 5;

        window.openReviewModal = (pid) => {
            currentReviewProjectId = pid;
            setRating(5);
            document.getElementById('rev-name').value = '';
            document.getElementById('rev-comment').value = '';
            const modal = document.getElementById('reviewModal');
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modal.querySelector('div').classList.remove('scale-95');
        };

        window.closeReviewModal = () => {
            const modal = document.getElementById('reviewModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.setRating = (stars) => {
            currentRating = stars;
            const icons = document.getElementById('star-container').children;
            for(let i=0; i<5; i++) {
                if(i < stars) { icons[i].classList.add('text-yellow-500'); icons[i].classList.remove('text-gray-600'); }
                else { icons[i].classList.remove('text-yellow-500'); icons[i].classList.add('text-gray-600'); }
            }
        };

        window.submitReview = async () => {
            const name = document.getElementById('rev-name').value.trim();
            const comment = document.getElementById('rev-comment').value.trim();
            if(!name || !comment) return alert("Please enter your name and comment.");
            const btn = document.getElementById('btn-submit-rev');
            btn.innerText = "Publishing..."; btn.disabled = true;
            await addDoc(collection(db, "reviews"), { projectId: currentReviewProjectId, name, rating: currentRating, comment, createdAt: Date.now() });
            btn.innerText = "Post Review"; btn.disabled = false;
            closeReviewModal();
        };

        window.openLightbox = (src, type) => {
            const modal = document.getElementById('lightboxModal');
            const img = document.getElementById('lightboxImage');
            const iframeWrapper = document.getElementById('lightboxIframeWrapper');
            const iframe = document.getElementById('lightboxIframe');
            const nativeVideo = document.getElementById('lightboxNativeVideo');

            img.classList.add('hidden');
            iframeWrapper.classList.add('hidden');
            nativeVideo.classList.add('hidden');
            iframe.src = '';
            nativeVideo.src = '';

            if(type === 'photo') { 
                img.src = src; 
                img.classList.remove('hidden'); 
                img.classList.remove('scale-95');
            } 
            else if (type === 'tiktok' || type === 'youtube-short') {
                iframe.src = type === 'tiktok' ? `https://www.tiktok.com/embed/v2/${src}` : `https://www.youtube.com/embed/${src}?autoplay=1&rel=0`;
                
                iframe.style.width = "100%";
                iframe.style.maxWidth = "420px";
                iframe.style.height = "100%";
                iframeWrapper.className = "w-full px-2 sm:px-4 hidden flex flex-col items-center justify-center h-[85vh] mt-4 z-10 relative";
                iframeWrapper.classList.remove('hidden');
            }
            else if (type === 'youtube' || type === 'vimeo' || type === 'gdrive') { 
                if (type === 'youtube') iframe.src = `https://www.youtube.com/embed/${src}?autoplay=1&rel=0`; 
                else if (type === 'vimeo') iframe.src = `https://player.vimeo.com/video/${src}?autoplay=1&color=ffffff&title=0&byline=0&portrait=0`; 
                else iframe.src = `https://drive.google.com/file/d/${src}/preview`; 
                
                iframe.style.width = "100%";
                iframe.style.maxWidth = "1000px";
                iframe.style.aspectRatio = "16/9";
                iframe.style.height = "auto";
                iframeWrapper.className = "w-full px-2 sm:px-4 hidden flex flex-col items-center justify-center h-auto max-h-[85vh] z-10 relative";
                iframeWrapper.classList.remove('hidden'); 
            }
            else if (type === 'mp4') {
                nativeVideo.src = src;
                nativeVideo.classList.remove('hidden');
                nativeVideo.classList.remove('scale-95');
                nativeVideo.play();
            }

            modal.classList.remove('hidden'); 
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0'); 
        };

        window.closeModal = (id) => {
            const m = document.getElementById(id); 
            m.classList.add('opacity-0');
            document.getElementById('lightboxImage').classList.add('scale-95');
            document.getElementById('lightboxNativeVideo').classList.add('scale-95');
            
            setTimeout(() => { 
                m.classList.add('hidden'); 
                document.getElementById('lightboxIframe').src = ''; 
                
                const nativeVideo = document.getElementById('lightboxNativeVideo');
                nativeVideo.pause();
                nativeVideo.src = '';
            }, 300);
        };

        window.saveContact = () => {
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${profileData.name || 'Studio'}\nTEL;TYPE=WORK,VOICE:${profileData.phone || ''}\nEND:VCARD`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([vcard], { type: "text/vcard" }));
            a.download = "Contact.vcf"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };
    </script>
</body>
</html>
